<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Operator Aritmatika</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Latihan Operator Aritmatika</h1>
        <H2>Hasil Latihan</H2>

        <script>
            var a = 20;
            var b = 4;

            document.write( `<p>${a} + ${b} = <span>${a + b}</span></p>` );
            document.write( `<p>${a} * ${b} = <span>${a * b}</span></p>` );
            document.write( `<p>${a} / ${b} = <span>${a / b}</span></p>` );
            document.write( `<p>${a} % ${b} = <span>${a % b}</span></p>` );
        </script>
    </div>
</body>
</html>
